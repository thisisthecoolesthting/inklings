name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install --no-audit --no-fund
      - run: npx prisma generate
      - run: npx tsc --noEmit
      - run: npx next build
        env:
          DATABASE_URL: postgresql://stub:stub@localhost:5432/stub
          INK_SESSION_SECRET: ci-only-stub-not-for-prod-32chars
          NEXT_PUBLIC_APP_URL: https://inklings.shop
          NEXT_TELEMETRY_DISABLED: "1"
      - run: npx tsx scripts/generate_sample_kdp.ts
        env:
          DATABASE_URL: postgresql://stub:stub@localhost:5432/stub
      - uses: actions/upload-artifact@v4
        with:
          name: kdp-sample
          path: build/proof/kdp-sample.pdf
          if-no-files-found: error

  smoke:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 8
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: inklings
          POSTGRES_PASSWORD: inklings_test
          POSTGRES_DB: inklings_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://inklings:inklings_test@localhost:5432/inklings_test
      INK_SESSION_SECRET: ci-only-stub-not-for-prod-32chars
      NEXT_PUBLIC_APP_URL: http://localhost:3400
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install --no-audit --no-fund
      - run: npx prisma generate && npx prisma db push --skip-generate
      - run: npx playwright install chromium --with-deps
      - run: npx next build
      - name: start server
        run: |
          npx next start -p 3400 &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3400 >/dev/null; then echo "server up"; break; fi
            sleep 1
          done
      - run: npx playwright test tests/smoke.spec.ts --reporter=list
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3400
